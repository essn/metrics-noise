apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-noise-config
  namespace: metrics-noise
data:
  PHX_HOST: "metrics-noise.example.com"  # replace with your actual hostname
  PORT: "4000"
  # Enables Erlang node clustering via DNS — set to the headless service FQDN
  # if you run more than one replica. Leave unset for single-replica deployments.
  # DNS_CLUSTER_QUERY: "metrics-noise.metrics-noise.svc.cluster.local"
